services:
  postgres-dwh:
    image: postgres:18-alpine
    container_name: postgres-dwh
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-postgres_dwh}
    networks:
      - dwh_net
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-postgres_dwh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G # Plenty for small-scale analytics
    ports:
      - "127.0.0.1:5432:5432" # Binds ONLY to localhost on the server (for Tailscale access with DBeaver)

networks:
  dwh_net:
    external: true

volumes:
  postgres_dwh_data: