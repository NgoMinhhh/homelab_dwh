services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    hostname: metabase
    volumes:
      - /dev/urandom:/dev/random:ro
    ports:
      - 3000:3000
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${MB_DB_DBNAME:-metabaseappdb}
      MB_DB_PORT: 5432
      MB_DB_USER: ${MB_DB_USER:-metabase}
      MB_DB_PASS: ${MB_DB_PASS:-metabase}
      MB_DB_HOST: ${MB_DB_HOST:-postgres}
    networks:
      - metabase_net
      - dwh_net
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      
  postgres:
    image: postgres:16
    container_name: postgres
    hostname: postgres
    environment:
      POSTGRES_USER: ${MB_DB_USER:-metabase}
      POSTGRES_DB: ${MB_DB_DBNAME:-metabaseappdb}
      POSTGRES_PASSWORD: ${MB_DB_PASS:-metabase}
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    networks:
      - metabase_net

networks:
  dwh_net:
    external: true
  metabase_net:
    driver: bridge
