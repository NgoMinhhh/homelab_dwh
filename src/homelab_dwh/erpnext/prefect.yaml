---
# Welcome to your prefect.yaml file! You can use this file for
# storing and managing configuration for deploying your flows.
# We recommend committing this file to source control along
# with your flow code.

# Generic metadata about this project
name: erpnext-dlt
prefect-version: 3.6.27

# build section allows you to manage and build docker images
build: null

# push section allows you to manage if and how this project
# is uploaded to remote locations
push: null

# pull section allows you to provide instructions for cloning
# this project in remote locations
pull:
- prefect.deployments.steps.git_clone:
    id: clone_repo
    repository: https://github.com/NgoMinhhh/homelab_dwh.git
    branch: main
- prefect.deployments.steps.set_working_directory:
    directory: "{{ clone_repo.directory }}"

# the deployments section allows you to provide configuration
# for deploying flows
deployments:
- name: initial-full-load
  version: "1.0"
  tags: ["erpnext", "dlt", "initial-load"]
  description: Initial full replace load of ERPNext MySQL into Postgres DWH
  schedule: {}
  flow_name: null
  entrypoint: src/homelab_dwh/erpnext/initial_load.py:load_entire_database_flow
  parameters: {}
  work_pool:
    name: local-pool
    work_queue_name: null
    job_variables: {}

- name: nightly-incremental-load
  version: "1.0"
  tags: ["erpnext", "dlt", "incremental-load"]
  description: Initial full replace load of ERPNext MySQL into Postgres DWH
  schedule: 
    cron: "0 2 * * *"
    timezone: "Australia/Adelaide"
  flow_name: null
  entrypoint: src/homelab_dwh/erpnext/incremental_load.py:load_incremental_database_flow
  parameters: {}
  work_pool:
    name: local-pool
    work_queue_name: null
    job_variables: {}
